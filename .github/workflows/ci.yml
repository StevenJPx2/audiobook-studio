name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (tsc + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  sidecar:
    name: Sidecar (uv lock check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Verify lockfile is up to date
        working-directory: sidecar
        run: uv lock --check
      - name: Sync (resolve + install deps)
        working-directory: sidecar
        run: uv sync --frozen
      - name: Import smoke test (server module loads)
        working-directory: sidecar
        # kokoro/torch are heavy; just confirm the FastAPI app + non-ML deps import.
        run: uv run python -c "import fastapi, uvicorn, soundfile, fitz; print('sidecar deps OK')"

  backend:
    name: Backend (cargo check)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo check
        working-directory: src-tauri
        run: cargo check --locked
      - name: cargo fmt (check)
        working-directory: src-tauri
        run: cargo fmt --check || echo "::warning::rustfmt differences (non-blocking)"
