name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sidecar:
    name: Sidecar (uv lock check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Verify lockfile is up to date
        working-directory: sidecar
        run: uv lock --check
      - name: Sync (resolve + install deps)
        working-directory: sidecar
        run: uv sync --frozen
      - name: Import smoke test (server module loads)
        working-directory: sidecar
        # kokoro/torch are heavy; just confirm the FastAPI app + non-ML deps import.
        run: uv run python -c "import fastapi, uvicorn, soundfile, fitz; print('sidecar deps OK')"

  app:
    name: App (check + test + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      # eframe/egui need native windowing + GL libs to build on Linux.
      - name: Install GUI build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgl1-mesa-dev
      - name: cargo fmt (check)
        run: cargo fmt --check
      - name: cargo check
        run: cargo check --locked
      - name: cargo test
        run: cargo test --locked
