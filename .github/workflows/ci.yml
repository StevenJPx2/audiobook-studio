name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sidecar:
    name: Sidecar (uv lock + G2P smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Verify lockfile is up to date
        working-directory: sidecar
        run: uv lock --check
      - name: Sync (resolve + install deps, frozen)
        working-directory: sidecar
        run: uv sync --frozen
      - name: G2P smoke test (torch-free misaki phonemizes a line)
        working-directory: sidecar
        # The slim sidecar is torch-free: confirm misaki + the bundled
        # espeak-ng (espeakng_loader) load and produce phonemes end to end.
        run: |
          printf 'Hello world.\n__QUIT__\n' | uv run python g2p_server.py >/tmp/ph.txt 2>/tmp/ph.err
          echo "--- phonemes ---"; cat /tmp/ph.txt
          echo "--- ready line ---"; grep __READY__ /tmp/ph.err
          test -s /tmp/ph.txt

  app:
    name: App (check + test + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      # eframe/egui need native windowing + GL libs to build on Linux.
      - name: Install GUI build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgl1-mesa-dev
      - name: cargo fmt (check)
        run: cargo fmt --check
      - name: cargo check
        run: cargo check --locked
      - name: cargo test
        run: cargo test --locked
