<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brand background: deep indigo -> warm violet. -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B5BE6"/>
      <stop offset="1" stop-color="#3A2E8C"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8E9F5"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1B1640" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded-square app tile (macOS superellipse-ish corner). -->
  <rect x="96" y="96" width="832" height="832" rx="196" fill="url(#bg)"/>

  <!-- Open book -->
  <g filter="url(#soft)">
    <!-- Left page -->
    <path d="M512 360
             C 430 318, 320 308, 250 322
             L 250 690
             C 320 676, 430 686, 512 728 Z" fill="url(#page)"/>
    <!-- Right page -->
    <path d="M512 360
             C 594 318, 704 308, 774 322
             L 774 690
             C 704 676, 594 686, 512 728 Z" fill="url(#page)"/>
    <!-- Spine -->
    <rect x="503" y="356" width="18" height="376" rx="9" fill="#C9CBEA"/>
  </g>

  <!-- Sound waves rising from the book (audiobook motif). -->
  <g fill="none" stroke="#FFD15C" stroke-width="26" stroke-linecap="round">
    <path d="M598 470 q 44 42 0 84" />
    <path d="M648 442 q 78 70 0 140" />
    <path d="M698 416 q 110 96 0 192" />
  </g>
</svg>
